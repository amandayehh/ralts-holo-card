<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Ralts — Holographic Card</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="controls">
    <div><button id="gyro" type="button" hidden>Enable gyroscope</button></div>
    <select id="effect"></select>
  </div>

  <main class="stage">

    <div class="card interactive" data-rarity="rare holo v" data-supertype="pokémon" data-subtypes="basic">
      <div class="card__translater">
        <div class="card__rotator">
          <img class="card__front" src="card.png" alt="Ralts" />
          <div class="card__shine"></div>
          <div class="card__glare"></div>
        </div>
      </div>
    </div>

  </main>

  <script src="script.js"></script>
</body>
</html>
